name: Windows Rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  cli:
    name: CLI
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: cli

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cli/target
          key: windows-cli-nightly-cargo-${{ hashFiles('cli/rust-toolchain.toml', 'cli/Cargo.lock', 'sdk/rust/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Check default features
        run: cargo check --target x86_64-pc-windows-msvc

      - name: Check no default features
        run: cargo check --target x86_64-pc-windows-msvc --no-default-features

      - name: Clippy
        run: cargo clippy --target x86_64-pc-windows-msvc --all-targets

      - name: Test library
        run: cargo test --target x86_64-pc-windows-msvc --lib

      - name: Build binary
        run: cargo build --target x86_64-pc-windows-msvc

  sdk:
    name: Rust SDK
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: sdk/rust

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sdk/rust/target
          key: windows-sdk-cargo-${{ hashFiles('sdk/rust/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Check
        run: cargo check --target x86_64-pc-windows-msvc

      - name: Test
        run: cargo test --target x86_64-pc-windows-msvc
